{% extends "accounts/_auth_base.html" %}
{% block title %}Forgot password — {{ SITE_NAME }}{% endblock %}

{% block auth_content %}
<h1 class="text-3xl font-extrabold">Forgot password?</h1>
<p class="text-slate-500 mt-1">Enter your email and we'll send a reset code.</p>
<form method="post" class="mt-8 space-y-4">
    {% csrf_token %}
    <div>{{ form.email }}</div>
    <button class="w-full gradient-primary text-white font-semibold py-3 rounded-xl hover:opacity-90">Send Reset Code</button>
</form>
<p class="text-center text-sm text-slate-500 mt-6"><a href="{% url 'accounts:login' %}" class="text-primary font-semibold hover:underline">Back to sign in</a></p>
{% endblock %}
