{% extends "base.html" %}
{% block title %}FAQs — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <h1 class="text-4xl font-extrabold text-center" data-i18n="faq.title">Frequently Asked Questions</h1>
    <div class="mt-10 space-y-3">
        {% for faq in faqs %}
        <div x-data="{ open: false }" class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden">
            <button @click="open = !open" class="w-full flex items-center justify-between p-5 text-left font-semibold">
                {{ faq.question }}<i data-lucide="chevron-down" class="w-5 h-5 transition" :class="open && 'rotate-180'"></i>
            </button>
            <div x-show="open" x-cloak class="px-5 pb-5 text-slate-600 dark:text-slate-300 text-sm">{{ faq.answer|linebreaks }}</div>
        </div>
        {% empty %}<p class="text-slate-500 text-center" data-i18n="faq.none">No FAQs yet.</p>{% endfor %}
    </div>
</div>
{% endblock %}
