<div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700" data-aos="fade-up">
    <div class="flex items-center justify-between">
        <span class="w-11 h-11 rounded-xl flex items-center justify-center {{ color|default:'bg-primary/10 text-primary' }}">
            <i data-lucide="{{ icon }}" class="w-6 h-6"></i>
        </span>
    </div>
    <p class="text-3xl font-extrabold mt-4">{{ value }}</p>
    <p class="text-slate-500 text-sm"{% if key %} data-i18n="{{ key }}"{% endif %}>{{ label }}</p>
</div>
