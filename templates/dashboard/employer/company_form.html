{% extends "dashboard/base.html" %}
{% block page_title %}Company Profile{% endblock %}

{% block dashboard %}
<form method="post" enctype="multipart/form-data" class="max-w-3xl space-y-6">
    {% csrf_token %}
    <h2 class="text-2xl font-extrabold">Company Profile</h2>
    <section class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700 grid sm:grid-cols-2 gap-4">
        {% for field in form %}
        <div class="{% if field.name in 'about,tagline' %}sm:col-span-2{% endif %}">
            <label class="text-sm font-medium">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
    </section>
    <div class="flex justify-end"><button class="gradient-primary text-white font-semibold px-8 py-3 rounded-xl">Save Company</button></div>
</form>
{% endblock %}
