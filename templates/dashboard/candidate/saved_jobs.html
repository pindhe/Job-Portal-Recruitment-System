{% extends "dashboard/base.html" %}
{% block page_title %}Saved Jobs{% endblock %}

{% block dashboard %}
<h2 class="text-2xl font-extrabold mb-6">Saved Jobs</h2>
<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
    {% for s in saved %}{% include "jobs/_job_card.html" with job=s.job %}{% empty %}
    <div class="col-span-3 text-center py-16 bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
        <i data-lucide="bookmark" class="w-12 h-12 mx-auto text-slate-300"></i>
        <p class="mt-3 font-semibold">No saved jobs</p>
        <a href="{% url 'jobs:list' %}" class="text-primary text-sm">Browse jobs →</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
